[pytest]
asyncio_mode = auto

[coverage:run]
omit =
    tests/*
    .venv/*
    frontend/*
    templates/*
    scripts/*
    */site-packages/*
    imap_poller.py
    logging_config.py
    metrics.py

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:
    raise NotImplementedError
    \.\.\.
