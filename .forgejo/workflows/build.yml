name: Build, Test, Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: docker-build
    steps:
      - name: Pipeline
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          KOMODO_KEY: ${{ secrets.KOMODO_KEY }}
          KOMODO_SECRET: ${{ secrets.KOMODO_SECRET }}
        run: |
          set -e
          notify() {
            local status="$1" title="$2" body="$3"
            curl -sf -X POST http://192.168.0.2:9932/notify/uptime-kuma \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"${title}\",\"body\":\"${body}\",\"type\":\"${status}\"}" 2>/dev/null || true
          }
          trap 'notify "failure" "Trackbox CI FAILED" "Pipeline failed at $(date). Check Forgejo Actions."' ERR

          # Checkout
          rm -rf /tmp/trackbox-ci
          git clone --depth 1 http://192.168.0.2:3002/bullitt/trackbox.git /tmp/trackbox-ci
          cd /tmp/trackbox-ci
          SHA=$(git rev-parse --short HEAD)

          # Verify requirements.lock is in sync with requirements.txt
          # (Install unpinned deps in a temp venv, freeze, diff against the lock file)
          python3 -m venv /tmp/trackbox-lockcheck
          /tmp/trackbox-lockcheck/bin/pip install -q --no-cache-dir -r requirements.txt
          /tmp/trackbox-lockcheck/bin/pip freeze > /tmp/trackbox-freeze.txt
          if ! diff -u requirements.lock /tmp/trackbox-freeze.txt; then
            echo "ERROR: requirements.lock is out of sync with requirements.txt. Run 'make lock' to regenerate."
            exit 1
          fi
          rm -rf /tmp/trackbox-lockcheck /tmp/trackbox-freeze.txt

          # Test (lint + pytest + security) — reuse cached layers when available
          BUILDKIT_CACHE_IMAGE="git.stahmer.net/bullitt/trackbox:buildcache"
          DOCKER_BUILDKIT=1 docker build --target test \
            --cache-from "type=registry,ref=${BUILDKIT_CACHE_IMAGE}" .

          # Build production image — reuse cached layers
          echo "${REGISTRY_TOKEN}" | docker login git.stahmer.net -u bullitt --password-stdin
          DOCKER_BUILDKIT=1 docker build --target production \
            --cache-from "type=registry,ref=${BUILDKIT_CACHE_IMAGE}" \
            --build-arg VERSION=${SHA} \
            --build-arg BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t git.stahmer.net/bullitt/trackbox:${SHA} .
          docker tag git.stahmer.net/bullitt/trackbox:${SHA} git.stahmer.net/bullitt/trackbox:latest
          docker push git.stahmer.net/bullitt/trackbox:${SHA}
          docker push git.stahmer.net/bullitt/trackbox:latest
          docker tag git.stahmer.net/bullitt/trackbox:latest git.stahmer.lan/bullitt/trackbox:latest

          # Pre-deploy backup — snapshot the database before any container change
          ssh -o StrictHostKeyChecking=no docker@192.168.0.50 /srv/scripts/backup.sh
          echo "Pre-deploy backup complete."

          # Deploy — Komodo exclusively owns the container lifecycle (no manual stop/rm)
          # Pulling the new image first means Komodo can restart the container with it
          # immediately, minimising the unavailability window.
          docker pull git.stahmer.net/bullitt/trackbox:latest
          curl -sf -X POST "http://192.168.0.2:9120/execute" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${KOMODO_KEY}" \
            -H "X-Api-Secret: ${KOMODO_SECRET}" \
            -d '{"type":"DeployStack","params":{"stack":"n8n"}}'

          # Verify — fail the pipeline if the container never becomes healthy
          sleep 25
          healthy=0
          for i in 1 2 3 4 5; do
            if curl -sf http://192.168.0.50:8900/health > /dev/null 2>&1; then
              healthy=1
              # Smoke test with a realistic tracking email
              RESULT=$(curl -sf -X POST http://192.168.0.50:8900/ingest \
                -H "Content-Type: application/json" \
                -d "{\"from\":\"noreply@dhl.de\",\"subject\":\"CI Test Sendung\",\"body\":\"Sendungsnummer 00000000000000000000\",\"message_id\":\"ci-${SHA}-$$@test\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
              echo "Smoke: ${RESULT}"
              echo "${RESULT}" | grep -q '"action"' || { echo "Smoke test failed"; exit 1; }
              # Cleanup: delete test shipment
              SHIP_ID=$(echo "${RESULT}" | sed -n 's/.*"shipment_id":\([0-9]*\).*/\1/p')
              if [ -n "${SHIP_ID}" ] && [ "${SHIP_ID}" != "null" ]; then
                curl -sf -X DELETE "http://192.168.0.50:8900/api/shipments/${SHIP_ID}" > /dev/null
                echo "Cleaned up test shipment #${SHIP_ID}"
              fi
              break
            fi
            sleep 10
          done
          [ "$healthy" = "1" ] || { echo "ERROR: Health check timed out — container did not become healthy after deploy."; exit 1; }

          # Tag successful deploy
          TAG="deploy-$(date +%Y%m%d)-${SHA}"
          curl -sf -X POST "http://192.168.0.2:3002/api/v1/repos/bullitt/trackbox/tags" \
            -H "Authorization: token ${REGISTRY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${TAG}\",\"target\":\"${SHA}\",\"message\":\"Deployed ${SHA}\"}" || true

          # Notify success
          notify "success" "Trackbox deployed ${SHA}" "Lint, test, build, deploy, smoke test passed."

          # Cleanup
          cd / && rm -rf /tmp/trackbox-ci
