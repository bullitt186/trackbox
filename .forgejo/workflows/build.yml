name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: docker-build
    steps:
      - name: Build and push image
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -e
          rm -rf /tmp/trackbox-ci
          git clone --depth 1 http://git.stahmer.lan/bullitt/trackbox.git /tmp/trackbox-ci
          echo "${REGISTRY_TOKEN}" | docker login git.stahmer.lan -u bullitt --password-stdin
          docker build -t git.stahmer.lan/bullitt/trackbox:latest /tmp/trackbox-ci
          docker push git.stahmer.lan/bullitt/trackbox:latest
          rm -rf /tmp/trackbox-ci
          echo "Done: image pushed successfully"
