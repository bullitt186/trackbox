name: Build, Test, Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: docker-build
    steps:
      - name: Checkout
        run: |
          rm -rf /tmp/trackbox-ci
          git clone --depth 1 http://192.168.0.2:3002/bullitt/trackbox.git /tmp/trackbox-ci
          cd /tmp/trackbox-ci && echo "SHA=$(git rev-parse --short HEAD)" >> /tmp/trackbox-ci/.build-env

      - name: Test
        run: docker build --target test /tmp/trackbox-ci

      - name: Build production image
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -ex
          . /tmp/trackbox-ci/.build-env
          echo "${REGISTRY_TOKEN}" | docker login git.stahmer.net -u bullitt --password-stdin
          docker build --target production --build-arg VERSION=${SHA} -t git.stahmer.net/bullitt/trackbox:${SHA} /tmp/trackbox-ci
          docker tag git.stahmer.net/bullitt/trackbox:${SHA} git.stahmer.net/bullitt/trackbox:latest
          docker push git.stahmer.net/bullitt/trackbox:${SHA}
          docker push git.stahmer.net/bullitt/trackbox:latest
          docker tag git.stahmer.net/bullitt/trackbox:latest git.stahmer.lan/bullitt/trackbox:latest

      - name: Deploy
        env:
          KOMODO_KEY: ${{ secrets.KOMODO_KEY }}
          KOMODO_SECRET: ${{ secrets.KOMODO_SECRET }}
        run: |
          docker pull git.stahmer.net/bullitt/trackbox:latest
          docker stop trackbox 2>/dev/null || true
          docker rm trackbox 2>/dev/null || true
          curl -sf -X POST "http://192.168.0.2:9120/execute" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${KOMODO_KEY}" \
            -H "X-Api-Secret: ${KOMODO_SECRET}" \
            -d '{"type":"DeployStack","params":{"stack":"n8n"}}'

      - name: Verify deployment
        run: |
          sleep 25
          for i in 1 2 3 4 5; do
            if curl -sf http://192.168.0.50:8900/health > /dev/null 2>&1; then
              echo "Health check passed:"
              curl -s http://192.168.0.50:8900/health
              echo ""
              # Smoke test: ingest a test email
              RESULT=$(curl -sf -X POST http://192.168.0.50:8900/ingest \
                -H "Content-Type: application/json" \
                -d '{"from":"ci@test.local","subject":"CI smoke test","body":"test","message_id":"ci-smoke-'$i'-'$$'@test"}')
              echo "Smoke test: ${RESULT}"
              echo "${RESULT}" | grep -q '"shipment_id"' && echo "Ingest OK" && exit 0
              echo "Ingest returned unexpected response"
              exit 1
            fi
            sleep 10
          done
          echo "Health check FAILED"
          exit 1

      - name: Cleanup
        run: rm -rf /tmp/trackbox-ci
