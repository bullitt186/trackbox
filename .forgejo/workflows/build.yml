name: Build, Test, Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: docker-build
    steps:
      - name: Pipeline
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          KOMODO_KEY: ${{ secrets.KOMODO_KEY }}
          KOMODO_SECRET: ${{ secrets.KOMODO_SECRET }}
        run: |
          set -e
          notify() {
            local status="$1" title="$2" body="$3"
            curl -sf -X POST http://192.168.0.2:9932/notify/uptime-kuma \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"${title}\",\"body\":\"${body}\",\"type\":\"${status}\"}" 2>/dev/null || true
          }
          trap 'notify "failure" "Trackbox CI FAILED" "Pipeline failed at $(date). Check Forgejo Actions."' ERR

          # Checkout
          rm -rf /tmp/trackbox-ci
          git clone --depth 1 https://git.stahmer.net/bullitt/trackbox.git /tmp/trackbox-ci
          cd /tmp/trackbox-ci
          SHA=$(git rev-parse --short HEAD)

          # Semver bump from conventional commits
          LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -1)
          if [ -n "${LAST_TAG}" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi
          CURRENT=$(cat VERSION)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"

          BUMP="none"
          echo "${COMMITS}" | grep -qi "BREAKING CHANGE\|^.*!:" && BUMP="major" || true
          echo "${COMMITS}" | grep -qi "^feat" && [ "${BUMP}" = "none" ] && BUMP="minor" || true
          echo "${COMMITS}" | grep -qi "^fix\|^perf\|^security" && [ "${BUMP}" = "none" ] && BUMP="patch" || true

          if [ "${BUMP}" = "major" ]; then MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0
          elif [ "${BUMP}" = "minor" ]; then MINOR=$((MINOR+1)); PATCH=0
          elif [ "${BUMP}" = "patch" ]; then PATCH=$((PATCH+1))
          fi
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "${VERSION}" > VERSION

          # Test (lint + pytest + security)
          docker build --target test .

          # Build production image
          echo "${REGISTRY_TOKEN}" | docker login git.stahmer.net -u bullitt --password-stdin
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          docker build --target production \
            --build-arg VERSION="${VERSION}" \
            --build-arg BUILD_TIME="${BUILD_TIME}" \
            -t git.stahmer.net/bullitt/trackbox:${SHA} \
            -t git.stahmer.net/bullitt/trackbox:v${VERSION} \
            -t git.stahmer.net/bullitt/trackbox:latest .
          docker push git.stahmer.net/bullitt/trackbox:${SHA}
          docker push git.stahmer.net/bullitt/trackbox:v${VERSION}
          docker push git.stahmer.net/bullitt/trackbox:latest

          # Pre-deploy backup via Docker (no ssh/sqlite3 needed in runner)
          BACKUP_TS=$(date +%Y%m%d_%H%M%S)
          docker run --rm \
            -v /srv/docker-data/volumes/trackbox:/data \
            alpine sh -c "mkdir -p /data/backups && cp /data/trackbox.db /data/backups/trackbox_${BACKUP_TS}.db && ls -t /data/backups/trackbox_*.db | tail -n +8 | xargs rm -f 2>/dev/null || true" \
            2>/dev/null || true

          # Deploy via Komodo
          curl -sf -X POST "http://192.168.0.2:9120/execute" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${KOMODO_KEY}" \
            -H "X-Api-Secret: ${KOMODO_SECRET}" \
            -d '{"type":"DeployStack","params":{"stack":"trackbox"}}'

          # Verify
          sleep 25
          healthy=0
          for i in 1 2 3 4 5; do
            if curl -sf http://192.168.0.50:8900/health > /dev/null 2>&1; then
              healthy=1
              # Smoke test with a realistic tracking email
              RESULT=$(curl -sf -X POST http://192.168.0.50:8900/ingest \
                -H "Content-Type: application/json" \
                -d "{\"from\":\"noreply@dhl.de\",\"subject\":\"CI Test Sendung\",\"body\":\"Sendungsnummer 00000000000000000000\",\"message_id\":\"ci-${SHA}-$$@test\",\"date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
              echo "Smoke: ${RESULT}"
              echo "${RESULT}" | grep -q '"action"' || { echo "Smoke test failed"; exit 1; }
              # Cleanup: delete test shipment
              SHIP_ID=$(echo "${RESULT}" | sed -n 's/.*"shipment_id":\([0-9]*\).*/\1/p')
              if [ -n "${SHIP_ID}" ] && [ "${SHIP_ID}" != "null" ]; then
                curl -sf -X DELETE "http://192.168.0.50:8900/api/shipments/${SHIP_ID}" > /dev/null
                echo "Cleaned up test shipment #${SHIP_ID}"
              fi
              break
            fi
            sleep 10
          done
          [ "${healthy}" = "1" ] || { echo "Health check timed out"; exit 1; }

          # Create semver tag via Forgejo API (no git push needed)
          curl -sf -X POST "https://git.stahmer.net/api/v1/repos/bullitt/trackbox/tags" \
            -H "Authorization: token ${REGISTRY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"v${VERSION}\",\"target\":\"${SHA}\",\"message\":\"v${VERSION}\"}" 2>/dev/null || true

          # Create Forgejo release
          if [ -n "${LAST_TAG}" ]; then
            NOTES=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" | grep -v "^\- chore:" | head -30)
          else
            NOTES="- Initial release"
          fi
          NOTES_JSON=$(printf '"%s"' "$(printf '%s' "${NOTES}" | sed 's/\\/\\\\/g; s/"/\\"/g; s/$/\\n/g' | tr -d '\n' | sed 's/\\n$//')")
          curl -sf -X POST "https://git.stahmer.net/api/v1/repos/bullitt/trackbox/releases" \
            -H "Authorization: token ${REGISTRY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"v${VERSION}\",\"name\":\"v${VERSION}\",\"body\":${NOTES_JSON},\"draft\":false}" || true

          # Tag successful deploy
          DEPLOY_TAG="deploy-$(date +%Y%m%d)-${SHA}"
          curl -sf -X POST "https://git.stahmer.net/api/v1/repos/bullitt/trackbox/tags" \
            -H "Authorization: token ${REGISTRY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${DEPLOY_TAG}\",\"target\":\"${SHA}\",\"message\":\"Deployed v${VERSION} (${SHA})\"}" || true

          # Notify success
          notify "success" "Trackbox deployed v${VERSION} (${SHA})" "Lint, test, build, backup, deploy, smoke test passed."

          # Cleanup
          cd / && rm -rf /tmp/trackbox-ci
