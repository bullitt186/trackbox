name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: docker-build
    steps:
      - name: Debug environment
        run: |
          echo "=== env ==="
          env | sort | head -20
          echo "=== whoami ==="
          whoami
          echo "=== pwd ==="
          pwd
          echo "=== network ==="
          cat /etc/resolv.conf
          echo "=== git clone test ==="
          git clone --depth 1 http://192.168.0.2:3002/bullitt/trackbox.git /tmp/ci-test 2>&1 || echo "CLONE FAILED"
          ls /tmp/ci-test/main.py 2>&1 || echo "NO FILE"
          rm -rf /tmp/ci-test
