name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: docker-build
    steps:
      - name: Clone
        run: |
          rm -rf /tmp/trackbox-ci
          git clone --depth 1 http://git.stahmer.lan/bullitt/trackbox.git /tmp/trackbox-ci
          ls /tmp/trackbox-ci/main.py

      - name: Build image
        run: docker build -t git.stahmer.lan/bullitt/trackbox:latest /tmp/trackbox-ci

      - name: Push image
        run: |
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login git.stahmer.lan -u bullitt --password-stdin
          docker push git.stahmer.lan/bullitt/trackbox:latest

      - name: Cleanup
        run: rm -rf /tmp/trackbox-ci
