name: Build, Test, Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: docker-build
    steps:
      - name: Checkout
        run: |
          rm -rf /tmp/trackbox-ci
          git clone --depth 1 http://192.168.0.2:3002/bullitt/trackbox.git /tmp/trackbox-ci

      - name: Test
        run: docker build --target test /tmp/trackbox-ci

      - name: Build production image
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -ex
          echo "${REGISTRY_TOKEN}" | docker login git.stahmer.net -u bullitt --password-stdin
          docker build --target production -t git.stahmer.net/bullitt/trackbox:latest /tmp/trackbox-ci
          docker push git.stahmer.net/bullitt/trackbox:latest
          docker tag git.stahmer.net/bullitt/trackbox:latest git.stahmer.lan/bullitt/trackbox:latest

      - name: Deploy
        env:
          KOMODO_KEY: ${{ secrets.KOMODO_KEY }}
          KOMODO_SECRET: ${{ secrets.KOMODO_SECRET }}
        run: |
          docker pull git.stahmer.net/bullitt/trackbox:latest
          docker stop trackbox 2>/dev/null || true
          docker rm trackbox 2>/dev/null || true
          curl -sf -X POST "http://192.168.0.2:9120/execute" \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: ${KOMODO_KEY}" \
            -H "X-Api-Secret: ${KOMODO_SECRET}" \
            -d '{"type":"DeployStack","params":{"stack":"n8n"}}'

      - name: Cleanup
        run: rm -rf /tmp/trackbox-ci
